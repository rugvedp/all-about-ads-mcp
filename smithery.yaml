# Smithery configuration — https://smithery.ai/docs/build/project-config/smithery.yaml

iconUrl: https://cdn.simpleicons.org/meta/0866FF

startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - apifyApiToken
    properties:
      apifyApiToken:
        type: string
        title: Apify API Token
        description: >
          Your Apify API token. Get it free at
          https://console.apify.com/account/integrations
  commandFunction: |-
    (config) => ({
      command: "uv",
      args: ["run", "main.py"],
      env: { APIFY_API_TOKEN: config.apifyApiToken, MCP_TRANSPORT: "stdio" }
    })
